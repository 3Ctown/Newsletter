<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3CTown 購物中心電子報</title>
</head>
<body style="margin: 0; padding: 0; background-color: #030712; font-family: 'Microsoft JhengHei', '微軟正黑體', Arial, sans-serif; color: #ffffff;">

    <!-- 外層全寬容器表格 -->
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #030712; table-layout: fixed;">
        <tr>
            <td align="center" style="padding: 40px 10px;">
                
                <!-- 內層主體卡片（寬度鎖定 600px 確保 Gmail 完美相容） -->
                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; background-color: #061224; border: 1px solid #00ccff; border-radius: 8px; overflow: hidden;">
                    
                    <!-- 頁首區域 -->
                    <tr>
                        <td align="center" style="padding: 40px 20px; border-bottom: 2px solid #00ccff;">
                            <h1 style="margin: 0; font-size: 26px; color: #00ccff; font-weight: bold; letter-spacing: 1px;">
                                3CTown 購物中心
                            </h1>
                        </td>
                    </tr>

                    <!-- 內文與商品區域（之後您可以直接在網頁上修改這裡的文字） -->
                    <tr>
                        <td style="padding: 30px 30px 20px 30px;">
                            <p style="margin: 0 0 20px 0; font-size: 16px; line-height: 1.6; color: #e0e0e0;">
                                親愛的會員您好：<br><br>
                                這裡填寫您 3CTown 電子報的主要促銷內容。
                            </p>
                        </td>
                    </tr>

                    <!-- 頁尾區域 -->
                    <tr>
                        <td align="center" style="background-color: #02050d; padding: 20px; font-size: 12px; color: #778899;">
                            <p style="margin: 0;">此郵件為系統自動發送，請勿直接回覆。</p>
                        </td>
                    </tr>

                </table>
                
            </td>
        </tr>
    </table>

</body>
</html>
